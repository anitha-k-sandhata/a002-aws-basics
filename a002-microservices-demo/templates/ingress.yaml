apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: microservices-ingress
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip

spec:
  ingressClassName: alb

  rules:
    - http:
        paths:

          - path: /products
            pathType: Prefix

            backend:
              service:
                name: product-service
                port:
                  number: {{ .Values.product.servicePort }}

          - path: /orders
            pathType: Prefix

            backend:
              service:
                name: order-service
                port:
                  number: {{ .Values.order.servicePort }}
